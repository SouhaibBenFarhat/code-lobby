<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background - Parcellab dark blue -->
  <rect width="512" height="512" fill="#1a1f6c"/>
  
  <!-- 
    CL Monogram Design:
    - The C wraps around and shares the vertical line with L
    - The L's vertical stroke completes the C
    - Creates a unified, clever mark
  -->
  
  <!-- C shape - opens to the right, the L completes it -->
  <path
    d="M280 96
       C140 96, 80 180, 80 256
       C80 332, 140 416, 280 416"
    stroke="white"
    stroke-width="56"
    stroke-linecap="round"
    fill="none"
  />
  
  <!-- L shape - vertical line + horizontal base -->
  <!-- The vertical line also serves as the missing edge of C -->
  <path
    d="M280 96
       L280 416
       L432 416"
    stroke="white"
    stroke-width="56"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
</svg>
