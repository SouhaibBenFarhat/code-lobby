name: Notify portfolio of showcase changes

# When a push to main changes this landing page, tell the portfolio repo to rebuild.
#
# The portfolio's Showcase section renders this project as a card built from THIS page's
# og:title / og:description / og:image, read at BUILD time. So a change here stays invisible
# there until the portfolio is rebuilt — this fires that rebuild.
#
# Deliberately on `push` + paths rather than on `release`: the card's content is this page's
# OG tags, which change when site/ changes. Releases often don't touch site/ at all, and site/
# changes often aren't releases — the OG image swap that prompted this workflow was exactly
# the latter, and a release trigger would have missed it entirely.
#
# Requires a repo secret PORTFOLIO_DISPATCH_TOKEN: a fine-grained PAT scoped to
# souhaibbenfarhat.github.io with "Contents: Read and write" permission (the
# repository_dispatch API is gated behind Contents write). Until it is set, the job no-ops
# instead of failing, so this can be merged before the secret exists.

on:
  push:
    branches: [main]
    paths:
      - "site/**"
  workflow_dispatch:

# Coalesce rapid pushes so a burst of commits doesn't fire a burst of rebuilds.
concurrency:
  group: notify-portfolio
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger a portfolio rebuild
        env:
          TOKEN: ${{ secrets.PORTFOLIO_DISPATCH_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "PORTFOLIO_DISPATCH_TOKEN not set — skipping dispatch."
            exit 0
          fi
          status=$(curl -sS -o /dev/stderr -w "%{http_code}" -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/SouhaibBenFarhat/souhaibbenfarhat.github.io/dispatches \
            -d '{"event_type":"showcase-updated"}')
          echo "GitHub API responded $status"
          # 204 = accepted. Anything else is a real failure worth surfacing.
          [ "$status" = "204" ]
