name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # Detect whether this change actually touches app code / build/test config.
  # Docs-, site-, and unrelated-workflow-only changes skip the expensive jobs
  # below — but the `test` gate still runs and passes, so the required status
  # check is always reported (a plain `paths:` filter would leave it "pending"
  # forever and block the PR).
  changes:
    name: Detect relevant changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Filter changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          # If ANY of these match, run the full lint/typecheck/test/coverage suite.
          filters: |
            code:
              - 'src/**'
              - '--module-*/**'
              - 'tests/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tsconfig*.json'
              - 'biome.json'
              - 'vitest.config.ts'
              - 'electron.vite.config.ts'
              - 'drizzle.config.ts'
              - 'drizzle/**'
              - 'tailwind.config.js'
              - 'postcss.config.js'
              - '.github/workflows/test.yml'

  # Lint + typecheck run in parallel with the test shards (off the critical path).
  lint-typecheck:
    name: Lint & Typecheck
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run linter
        run: pnpm run lint
      - name: Run type check
        run: pnpm run typecheck

  # Tests are sharded across parallel runners. Each shard runs WITH coverage and
  # writes a "blob" report (raw results + coverage) that the coverage job merges —
  # so the suite runs ONCE, not again for coverage.
  unit:
    name: Unit (shard ${{ matrix.shard }}/3)
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run tests (shard ${{ matrix.shard }}/3) with coverage
        run: pnpm exec vitest run --coverage --reporter=default --reporter=blob --shard=${{ matrix.shard }}/3
      - name: Upload coverage blob
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ matrix.shard }}
          path: .vitest-reports/*
          include-hidden-files: true
          retention-days: 1

  # Merge the shard blobs into ONE coverage report (no re-run), post a PR comment,
  # and fail if <90% of the lines CHANGED in this PR are covered (diff-cover).
  coverage:
    name: Coverage (merge + 90% patch gate)
    needs: [changes, unit]
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # to post the coverage comment
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so diff-cover can diff against the base
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Download coverage blobs from all shards
        uses: actions/download-artifact@v4
        with:
          path: .vitest-reports
          pattern: blob-report-*
          merge-multiple: true
      - name: Merge shard reports into one coverage report
        run: pnpm exec vitest run --merge-reports --coverage
      - name: Post coverage comment
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          file-coverage-mode: changes # focus the comment on the PR's changed files
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install diff-cover
        run: pip install diff-cover
      - name: Fetch base branch
        env:
          BASE: ${{ github.event.pull_request.base.ref || 'main' }}
        run: git fetch --no-tags origin "$BASE"
      - name: Enforce 90% coverage on changed lines
        env:
          BASE: ${{ github.event.pull_request.base.ref || 'main' }}
        run: |
          set -o pipefail
          diff-cover coverage/cobertura-coverage.xml \
            --compare-branch="origin/$BASE" \
            --fail-under=90 | tee -a "$GITHUB_STEP_SUMMARY"

  # Aggregate gate — THIS is the required status check on `main`. Keeping the
  # name `test` means branch protection needs no change. It ALWAYS runs (so the
  # required check is always reported) and passes when the code jobs succeeded
  # OR were skipped (a non-code change); it fails only if one actually failed.
  test:
    name: test
    needs: [changes, lint-typecheck, unit, coverage]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify no required job failed
        run: |
          for entry in \
            "changes=${{ needs.changes.result }}" \
            "lint-typecheck=${{ needs.lint-typecheck.result }}" \
            "unit=${{ needs.unit.result }}" \
            "coverage=${{ needs.coverage.result }}"; do
            name="${entry%%=*}"
            result="${entry##*=}"
            # success and skipped are both OK; skipped means no code changed.
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              echo "::error::Required job '$name' $result"
              exit 1
            fi
          done
          echo "All required checks passed (code jobs run on code changes, skipped otherwise) ✅"
