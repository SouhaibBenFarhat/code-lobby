name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # Lint + typecheck run in parallel with the test shards (off the critical path).
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run linter
        run: pnpm run lint
      - name: Run type check
        run: pnpm run typecheck

  # Tests are sharded across parallel runners. Wall-clock ≈ slowest shard,
  # not the whole suite. (Free on public repos; costs more runner-minutes.)
  unit:
    name: Unit (shard ${{ matrix.shard }}/3)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run tests (shard ${{ matrix.shard }}/3)
        run: pnpm exec vitest run --shard=${{ matrix.shard }}/3

  # Patch coverage gate: fail if <90% of the lines CHANGED in this PR are covered.
  # Runs the full (non-sharded) suite once for a complete report, then diff-cover
  # compares against the base branch. Folded into `test` below so it blocks merges.
  coverage:
    name: Patch coverage (90% of new code)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so diff-cover can diff against the base
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run tests with coverage
        run: pnpm exec vitest run --coverage
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install diff-cover
        run: pip install diff-cover
      - name: Fetch base branch
        env:
          BASE: ${{ github.event.pull_request.base.ref || 'main' }}
        run: git fetch --no-tags origin "$BASE"
      - name: Enforce 90% coverage on changed lines
        env:
          BASE: ${{ github.event.pull_request.base.ref || 'main' }}
        run: |
          set -o pipefail
          diff-cover coverage/cobertura-coverage.xml \
            --compare-branch="origin/$BASE" \
            --fail-under=90 | tee -a "$GITHUB_STEP_SUMMARY"

  # Aggregate gate — THIS is the required status check on `main`. Keeping the
  # name `test` means branch protection needs no change. It passes only if
  # lint/typecheck, every test shard, AND the patch-coverage gate passed.
  test:
    name: test
    needs: [lint-typecheck, unit, coverage]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify all upstream jobs passed
        run: |
          if [ "${{ needs.lint-typecheck.result }}" != "success" ] || [ "${{ needs.unit.result }}" != "success" ] || [ "${{ needs.coverage.result }}" != "success" ]; then
            echo "::error::A required job failed (lint-typecheck=${{ needs.lint-typecheck.result }}, unit=${{ needs.unit.result }}, coverage=${{ needs.coverage.result }})"
            exit 1
          fi
          echo "All checks passed ✅"
