<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Bumpy/convex gradient - subtle 3D depth effect -->
    <radialGradient id="bump" cx="50%" cy="30%" r="80%" fx="50%" fy="25%">
      <stop offset="0%" stop-color="#1E2766"/>
      <stop offset="60%" stop-color="#141B4D"/>
      <stop offset="100%" stop-color="#0D1233"/>
    </radialGradient>

    <!-- Top highlight for gloss/convex feel -->
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.10"/>
      <stop offset="45%" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <!-- Subtle inner shadow at bottom for depth -->
    <linearGradient id="bottomShadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="80%" stop-color="black" stop-opacity="0"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.12"/>
    </linearGradient>
  </defs>

  <!--
    v7: Full square — macOS applies its own squircle mask automatically.
    No clip path needed. Compact hexagon (scaled to ~66%) so the navy
    background reads as a prominent frame around the mark.
  -->

  <!-- Background fills entire square (no transparency at corners) -->
  <rect width="512" height="512" fill="url(#bump)"/>

  <!-- Compact hexagon — pulled in further for a prominent navy frame in the dock -->
  <path
    d="M256 140
       L364 199
       L364 313
       L256 372
       L148 313
       L148 199
       Z"
    fill="white"
    fill-opacity="0.95"
  />

  <!-- Code brackets < > cut out as negative space -->
  <!-- Left bracket < -->
  <path
    d="M235 199
       L174 256
       L235 313
       L235 276
       L203 256
       L235 236
       Z"
    fill="#141B4D"
  />

  <!-- Right bracket > -->
  <path
    d="M277 199
       L338 256
       L277 313
       L277 276
       L309 256
       L277 236
       Z"
    fill="#141B4D"
  />

  <!-- Top gloss overlay for bumpy convex effect -->
  <rect width="512" height="512" fill="url(#gloss)"/>

  <!-- Bottom shadow for grounding -->
  <rect width="512" height="512" fill="url(#bottomShadow)"/>
</svg>
